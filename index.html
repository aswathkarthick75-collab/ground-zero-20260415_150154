<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ground zero - Live Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      
:root {
  --primary: #7c4dff;
  --secondary: #00e5ff;
  --bg: #0a0a12;
  --card-bg: rgba(255, 255, 255, 0.05);
  --text: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.7);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  overflow-x: hidden;
}

.app-container {
  min-height: 100vh;
  background: radial-gradient(circle at top right, rgba(124, 77, 255, 0.15), transparent),
              radial-gradient(circle at bottom left, rgba(0, 229, 255, 0.1), transparent);
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 8%;
  transition: all 0.3s ease;
  z-index: 1000;
}

.navbar.scrolled {
  background: rgba(10, 10, 18, 0.8);
  backdrop-filter: blur(10px);
  padding: 16px 8%;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.logo {
  font-size: 24px;
  font-weight: 800;
  background: linear-gradient(to right, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links span { color: var(--text-dim); cursor: pointer; transition: 0.3s; }
.nav-links span:hover { color: var(--text); }

.nav-btn {
  padding: 10px 24px;
  border-radius: 50px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(124, 77, 255, 0.4); }

.hero-section {
  padding: 180px 8% 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.glass-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 60px 40px;
  border-radius: 30px;
  max-width: 900px;
  width: 100%;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
}

.status-badge {
  display: inline-block;
  padding: 6px 16px;
  background: rgba(0, 229, 255, 0.1);
  color: var(--secondary);
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 24px;
}

h1 {
  font-size: clamp(32px, 8vw, 64px);
  font-weight: 900;
  margin-bottom: 24px;
  line-height: 1.1;
  background: linear-gradient(to bottom, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.description {
  font-size: clamp(16px, 2vw, 20px);
  color: var(--text-dim);
  margin-bottom: 40px;
  line-height: 1.6;
}

.hero-actions {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.primary-btn, .secondary-btn {
  padding: 16px 40px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

.primary-btn {
  background: white;
  color: black;
  border: none;
}

.secondary-btn {
  background: transparent;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.primary-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
.secondary-btn:hover { background: rgba(255, 255, 255, 0.05); }

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  padding: 80px 8%;
}

.feature-card {
  background: var(--card-bg);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: 0.3s;
  text-align: left;
}

.feature-card:hover { transform: translateY(-10px); border-color: rgba(124, 77, 255, 0.3); }

.icon { font-size: 40px; margin-bottom: 20px; }
h3 { font-size: 24px; margin-bottom: 16px; font-weight: 700; }
.feature-card p { color: var(--text-dim); line-height: 1.5; }

.footer {
  padding: 60px 8%;
  text-align: center;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  color: var(--text-dim);
}

.fade-in {
  animation: fadeIn 1s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .navbar { padding: 20px 5%; }
}

      /* Simulation specific adjustments */
      .app-container { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="root">
       <!-- The HTML structure of the app rendered directly for high-fidelity simulation -->
       <div class="app-container">
          <nav class="navbar">
            <div class="logo">ground zero</div>
            <div class="nav-links">
              <span>Home</span>
              <span>Features</span>
              <span>About</span>
              <button class="nav-btn">Get Started</button>
            </div>
          </nav>
          <main class="hero-section">
            <div class="glass-card fade-in">
              <div class="status-badge">Live System Simulation</div>
              <h1>ground zero</h1>
              <p class="description">build a website for a cafe named ground zero</p>
              <div class="hero-actions">
                <button class="primary-btn">Explore Platform</button>
                <button class="secondary-btn">View Docs</button>
              </div>
            </div>
          </main>
          <section class="features-grid">
            <div class="feature-card"><h3>🚀 Lightning Fast</h3><p>Optimized for peak performance.</p></div>
            <div class="feature-card"><h3>🛡️ Secure</h3><p>Enterprise-grade security.</p></div>
            <div class="feature-card"><h3>📊 Insights</h3><p>Real-time analytics.</p></div>
          </section>
       </div>
    </div>
    <script>
      // Simple simulation script for interactions
      window.addEventListener('scroll', () => {
        const nav = document.querySelector('.navbar');
        if (window.scrollY > 20) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
      });
    </script>
  </body>
</html>
